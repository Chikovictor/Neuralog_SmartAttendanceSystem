{% extends "base.html" %}

{% block content %}
  <div class="bg-white p-4 rounded-3 shadow-sm">
    <h3 class="mb-3">Group Photo Attendance</h3>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Upload group image</label>
        <input class="form-control" type="file" name="image" required>
      </div>
      <button class="btn btn-primary" type="submit">Process</button>
    </form>
  </div>

  {% if marked %}
    <div class="mt-4 bg-white p-4 rounded-3 shadow-sm">
      <h5>Marked Attendance</h5>
      <ul>
        {% for item in marked %}
          <li>{{ item.user }} ({{ item.label }}) - {{ item.score|floatformat:2 }}</li>
        {% endfor %}
      </ul>
      <p class="text-muted">Unknown faces: {{ unknown }}</p>
    </div>
  {% endif %}
{% endblock %}
